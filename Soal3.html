<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 3</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            padding: 5px;
        }
    </style>
</head>
<body>
    <form onsubmit="hitung(event)" onreset="resetForm()">
        <table border="1">
            <tr>
                <th colspan="3">PERHITUNGAN FAKTORIAL DAN DERET</th>
            </tr>
            <tr>
                <td>N</td>
                <td><input type="number" name="angka" id="angka"></td>
                <td>Masukkan nilai yang akan dihitung</td>
            </tr>
            <tr>
                <td>hasil</td>
                <td><span id="hasil"></span></td>
                <td>Hasil Muncul Disini</td>
            </tr>
            <tr>
                <td>Faktorial</td>
                <td><span id="faktorial"></span></td>
                <td>Hasil Faktorial Muncul Disini</td>
            </tr>
            <tr>
                <td>Deret</td>
                <td><span id="deret"></span></td>
                <td>Hasil Deret Muncul Disini</td>
            </tr>
            <tr>
                <td colspan="3" align="center">
                    <button type="submit">Hitung</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>
        </table>
    </form>

    <script>
        function hitung(event) {
            event.preventDefault();

            let angka = parseInt(document.getElementById("angka").value);
            let faktorial = 1;
            let jumlah = 0;

            for (let i = 1; i <= angka; i++) {
                faktorial *= i;
                jumlah += i;
            }

            document.getElementById("hasil").innerText = angka;
            document.getElementById("faktorial").innerText = faktorial;
            document.getElementById("deret").innerText = jumlah;
        }

        function resetForm() {
            document.getElementById("hasil").innerText = "";
            document.getElementById("faktorial").innerText = "";
            document.getElementById("deret").innerText = "";
        }
    </script>
</body>
</html>
